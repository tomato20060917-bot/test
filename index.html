<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baka Hunter Pro</title>
    <style>
        :root { --bg: #0f172a; --text: #f8fafc; --accent: #38bdf8; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; user-select: none; }
        #game-area { position: relative; width: 100vw; height: 100vh; cursor: crosshair; }
        #target { position: absolute; font-size: 60px; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s; cursor: pointer; z-index: 10; }
        #target:hover { filter: drop-shadow(0 0 10px var(--accent)); transform: scale(1.1); }
        .ui { position: absolute; top: 20px; text-align: center; pointer-events: none; }
        #score { font-size: 2rem; font-weight: bold; }
        #msg { font-size: 1.2rem; opacity: 0.8; }
        .reset-btn { pointer-events: auto; background: var(--accent); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="ui">
    <h1 id="title">Catch the Baka!</h1>
    <div id="score">Score: 0</div>
    <div id="msg">Keep your eyes sharp.</div>
    <button id="reset" class="reset-btn" onclick="game.init()">Play Again</button>
</div>

<div id="game-area">
    <div id="target">🤡</div>
</div>

<script>
const game = {
    score: 0,
    maxScore: 10,
    icons: ['💩', '🤡', '👺', '👀', '💀'],
    el: document.getElementById('target'),
    scoreEl: document.getElementById('score'),
    
    init() {
        this.score = 0;
        this.scoreEl.innerText = 'Score: 0';
        document.getElementById('title').innerText = "Catch the Baka!";
        document.getElementById('reset').style.display = 'none';
        this.el.style.display = 'block';
        this.moveTarget();
    },

    moveTarget() {
        const padding = 100;
        const x = Math.random() * (window.innerWidth - padding * 2) + padding/2;
        const y = Math.random() * (window.innerHeight - padding * 2) + padding/2;
        this.el.style.left = `${x}px`;
        this.el.style.top = `${y}px`;
        
        if (this.score > 5) {
            this.el.innerText = this.icons[Math.floor(Math.random() * this.icons.length)];
            this.el.style.fontSize = (Math.random() * 60 + 40) + 'px';
        }
    },

    handleHit() {
        this.score++;
        this.scoreEl.innerText = `Score: ${this.score}`;
        
        if (this.score >= this.maxScore) {
            this.el.style.display = 'none';
            document.getElementById('title').innerText = "VICTORY ACHIEVED";
            document.getElementById('reset').style.display = 'block';
        } else {
            this.moveTarget();
        }
    }
};

game.el.addEventListener('mousedown', (e) => {
    e.stopPropagation();
    game.handleHit();
});

document.body.addEventListener('mousedown', () => {
    // Optional: Add penalty logic here for clicking outside the target
});

game.init();
</script>
</body>
</html>
