<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ULTRA BAKA RAGE: THE EGG OF DESTINY</title>
<style>
body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
#canvas-container { width: 100vw; height: 100vh; cursor: crosshair; }
#ui { position: absolute; top: 20px; left: 20px; color: #ff00ff; font-size: 40px; pointer-events: none; text-shadow: 0 0 10px #fff; z-index: 100; }
.shake { animation: shake 0.2s infinite; }
@keyframes shake { 0% { transform: translate(1px, 1px); } 100% { transform: translate(-1px, -2px); } }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>
<div id="ui">SCORE: <span id="score">0</span></div>
<div id="canvas-container"></div>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;
    const container = document.getElementById('canvas-container');
    const scoreEl = document.getElementById('score');
    let score = 0;

    const engine = Engine.create();
    const render = Render.create({
        element: container,
        engine: engine,
        options: { 
            width: window.innerWidth, 
            height: window.innerHeight, 
            wireframes: false, 
            background: '#111' 
        }
    });

    const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 50, window.innerWidth, 100, { isStatic: true });
    Composite.add(engine.world, [ground]);

    function createBaka() {
        const baka = Bodies.circle(Math.random() * window.innerWidth, -50, 40, {
            restitution: 0.8,
            render: { sprite: { texture: 'https://cdn-icons-png.flaticon.com/512/3069/3069172.png', xScale: 0.15, yScale: 0.15 } }
        });
        Composite.add(engine.world, baka);
    }

    document.addEventListener('click', (e) => {
        const explosion = Bodies.circle(e.clientX, e.clientY, 30, { restitution: 2, render: { fillStyle: '#ffff00' } });
        Composite.add(engine.world, explosion);
        Body.applyForce(explosion, explosion.position, { x: (Math.random() - 0.5) * 0.2, y: -0.2 });
        
        score += 10;
        scoreEl.innerText = score;
        container.classList.add('shake');
        setTimeout(() => container.classList.remove('shake'), 100);
        
        setTimeout(() => Composite.remove(engine.world, explosion), 2000);
    });

    Events.on(engine, 'afterUpdate', () => {
        const bodies = Composite.allBodies(engine.world);
        for (let i = 0; i < bodies.length; i++) {
            const body = bodies[i];
            if (body !== ground && body.position.y > window.innerHeight + 100) {
                Composite.remove(engine.world, body);
                if (body.circleRadius === 40) { // Check if it's a baka
                    score = Math.max(0, score - 50);
                    scoreEl.innerText = score;
                }
            }
        }
    });

    setInterval(createBaka, 800);
    Render.run(render);
    Runner.run(Runner.create(), engine);

    window.addEventListener('resize', () => {
        render.canvas.width = window.innerWidth;
        render.canvas.height = window.innerHeight;
        Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + 50 });
    });
});
</script>
</body>
</html>
