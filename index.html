<!DOCTYPE html>
<html>
<body style="background:#000; color:#0f0; text-align:center; font-family:sans-serif; cursor:crosshair; overflow:hidden">
<h1 id="score" style="font-size:50px">0</h1>
<div id="target" style="width:100px; height:100px; background:#f0f; border-radius:50%; cursor:pointer; position:absolute; display:flex; align-items:center; justify-content:center; top:100px; left:calc(50% - 50px)">EAT ME</div>
<script>
let s = 0, timer, t = document.getElementById('target');

function getRandomColor() {
    return '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
}

function moveTarget() {
    t.style.left = Math.random() * (window.innerWidth - 100) + 'px';
    t.style.top = Math.random() * (window.innerHeight - 100) + 'px';
}

function startTimer() {
    clearInterval(timer);
    const speed = Math.max(100, 800 - (s * 20));
    timer = setInterval(moveTarget, speed);
}

t.onclick = () => {
    s++;
    document.getElementById('score').innerText = s;
    moveTarget();
    t.style.backgroundColor = getRandomColor();
    
    if(s > 10) t.innerText = "TOO FAST!";
    if(s > 20) { t.style.transform = "rotate(180deg)"; t.innerText = "WHY?"; }
    if(s >= 30) { 
        clearInterval(timer);
        alert("YOU WON AT LIFE. GO OUTSIDE."); 
        location.reload(); 
    } else {
        startTimer();
    }
};

startTimer();
</script>
</body>
</html>
