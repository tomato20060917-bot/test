<!DOCTYPE html>
<html>
<body style="background:#000; color:#0f0; text-align:center; font-family:impact; overflow:hidden; margin:0; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">

<div id="overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; z-index:100;">
    <button onclick="startGame()" style="padding:20px 40px; font-size:3vw; cursor:pointer; font-family:impact; background:#0f0; border:none;">START GAME</button>
</div>

<h1 id="s" style="font-size:10vw; margin:0;">0</h1>
<div id="b" style="cursor:pointer; font-size:5vw; display:none;" onclick="c(event)">CLICK THE TOAST</div>
<audio id="m" src="https://www.myinstants.com/media/sounds/bruh.mp3"></audio>

<script>
let score = 0;
const s = document.getElementById('s');
const b = document.getElementById('b');
const audio = document.getElementById('m');
const overlay = document.getElementById('overlay');

function startGame() {
    overlay.style.display = 'none';
    b.style.display = 'block';
    audio.play();
}

function c(event) {
    event.stopPropagation();
    audio.currentTime = 0;
    audio.play();
    
    score++;
    s.innerText = score;
    b.style.position = 'absolute';
    b.style.left = Math.random() * 80 + 'vw';
    b.style.top = Math.random() * 80 + 'vh';
    b.style.transform = `rotate(${Math.random()*360}deg)`;
    
    if(score > 5) {
        const randomColor = Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
        document.body.style.background = '#' + randomColor;
    }
    
    if(score === 10) { 
        b.innerText = "TOO FAST!"; 
        b.style.fontSize = "10vw"; 
    }
    
    if(score === 15) { 
        alert("YOU ARE A TOAST MASTER. LEAVE NOW."); 
        location.reload(); 
    }
}
</script>
</body>
</html>
