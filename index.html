<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baka-Ge: The Unclickable Button</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
/* CSS Variables for a consistent, premium theme */
:root {
    --primary-bg-dark: #1a1a2e; /* Deep purple-blue */
    --secondary-bg-dark: #16213e; /* Slightly lighter purple-blue */
    --button-text-color: #e0e0e0; /* Off-white for readability */
    --win-color: #00ffcc; /* Neon aqua for winning */
    --counter-color: #ffbd39; /* Gold/Orange for progress counter */
    --accent-color-default: #e94560; /* Initial accent color for button */
}

body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, var(--secondary-bg-dark) 0%, var(--primary-bg-dark) 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'VT323', monospace;
    color: var(--button-text-color);
    transition: background 0.7s ease-in-out; /* Smooth background transitions */
    cursor: crosshair; /* More engaging cursor to hint at interaction */
    user-select: none; /* Prevent text selection */
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
}

#b {
    position: absolute;
    font-family: 'Press Start 2P', cursive;
    font-size: 2.5em; /* Initial size, will be dynamically scaled */
    padding: 18px 30px; /* Slightly larger padding for better visuals */
    border-radius: 12px; /* Smoother corners */
    cursor: pointer;
    color: var(--button-text-color);
    text-transform: uppercase;
    text-align: center;
    border: none;
    /* Initial dynamic shadow using accent color variable */
    box-shadow: 0 0 10px rgba(255,255,255,0.3), 0 0 20px var(--accent-color-default)80, inset 0 0 5px rgba(255,255,255,0.5);
    transition: all 0.4s ease-in-out; /* Initial smooth transition, will be dynamically updated */
    background: linear-gradient(45deg, var(--accent-color-default) 0%, #a32236 100%); /* Initial gradient */
    will-change: transform, left, top, font-size, background, box-shadow; /* Optimize animations */
}

#b:hover {
    transform: scale(1.05);
    filter: brightness(1.2);
    box-shadow: 0 0 15px rgba(255,255,255,0.4), 0 0 30px var(--accent-color-default), inset 0 0 8px rgba(255,255,255,0.7);
}

#b:active {
    transform: scale(0.98);
    filter: brightness(0.8);
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    transition: all 0.1s ease-out; /* Quicker active state */
}

#w {
    display: none; /* Hidden by default, shown on win */
    font-family: 'Press Start 2P', cursive;
    font-size: 5.5em; /* Large, impactful win message */
    color: var(--win-color);
    text-shadow: 0 0 10px var(--win-color), 0 0 25px var(--win-color), 0 0 45px var(--win-color), 0 0 70px var(--win-color);
    position: absolute;
    width: 100%;
    text-align: center;
    opacity: 0; /* Start invisible for fade-in */
    transform: scale(0.9); /* Start slightly smaller */
    transition: opacity 0.8s ease-out, transform 0.8s ease-out; /* Fade and scale in */
    z-index: 20;
}

#w.animate-win {
    animation: pulse 1.5s infinite alternate ease-in-out;
    opacity: 1; /* Make visible */
    transform: scale(1); /* Return to normal size */
}

#counter {
    position: absolute;
    top: 25px;
    right: 30px;
    font-family: 'VT323', monospace;
    font-size: 1.6em;
    color: var(--counter-color);
    text-shadow: 0 0 5px var(--counter-color), 0 0 10px var(--counter-color)60;
    z-index: 10;
    pointer-events: none; /* Do not interfere with mouse events */
}

@keyframes pulse {
    from { transform: scale(1); text-shadow: 0 0 10px var(--win-color), 0 0 25px var(--win-color), 0 0 45px var(--win-color); opacity: 1; }
    to { transform: scale(1.03); text-shadow: 0 0 15px var(--win-color), 0 0 35px var(--win-color), 0 0 60px var(--win-color); opacity: 0.95; }
}

/* Fallback for darken function (not strictly needed with JS, but good practice) */
/* Custom Property for dynamic accent color in CSS pseudo-classes/hover states */
html {
    --current-button-accent-color: #e94560; /* Initial accent color */
}
#b:hover {
    box-shadow: 0 0 15px rgba(255,255,255,0.4), 0 0 30px var(--current-button-accent-color), inset 0 0 8px rgba(255,255,255,0.7);
}
</style>
</head>
<body>
<div id="b">Click Me!</div>
<div id="w">YOU WIN?!</div>
<div id="counter"></div>

<script>
const b = document.getElementById('b');
const w = document.getElementById('w');
const counterElement = document.getElementById('counter');

const msgs = [
    "NO! Really?", "STOP IT! My patience wears thin.", "WHY?! This is illogical!",
    "I HATE YOU! (Affectionately...)", "NEVER! I shall evade!", "YOU MONSTER! I'm getting smaller!",
    "LEAVE ME! I demand freedom!", "Ouch! That was a close one.", "Just one more...", "The final stand!"
];

const accentColors = [
    '#e94560', /* Red-Pink */
    '#00f890', /* Neon Green */
    '#ffbd39', /* Bright Orange */
    '#6a0572', /* Deep Purple */
    '#ff0040', /* Hot Pink */
    '#00eeff', /* Cyan */
    '#ffa500', /* Orange */
    '#c800ff'  /* Violet */
];

const primaryBackgroundColors = [
    '#1a1a2e',
    '#16213e',
    '#0f3460',
    '#232946'
];

let currentMessageIndex = 0;
const INITIAL_FONT_SIZE_EM = 2.5;
const MIN_FONT_SIZE_EM = 0.8;
const SHRINK_FACTOR = 0.85; /* Button shrinks to 85% of its previous size each click */
const INITIAL_TRANSITION_DURATION = 0.4; /* seconds for movement */
const MIN_TRANSITION_DURATION = 0.15; /* Fastest movement */
const MAX_TRANSITION_DIFFERENCE = INITIAL_TRANSITION_DURATION - MIN_TRANSITION_DURATION;

/**
 * Calculates a darker shade of a given hex color.
 * @param {string} hex - The hex color string (e.g., "#RRGGBB").
 * @param {number} percent - The percentage to darken (e.g., 20 for 20% darker).
 * @returns {string} The darkened hex color string.
 */
function getDarkerColor(hex, percent) {
    let r = parseInt(hex.slice(1, 3), 16);
    let g = parseInt(hex.slice(3, 5), 16);
    let b = parseInt(hex.slice(5, 7), 16);

    r = Math.max(0, r - Math.round(r * percent / 100));
    g = Math.max(0, g - Math.round(g * percent / 100));
    b = Math.max(0, b - Math.round(b * percent / 100));

    return `#${(r).toString(16).padStart(2, '0')}${(g).toString(16).padStart(2, '0')}${(b).toString(16).padStart(2, '0')}`;
}

/**
 * Gets the current rendered dimensions of the button.
 * Uses offsetWidth/Height which often force a reflow for accuracy after style changes.
 * @returns {{width: number, height: number}} Object containing button width and height.
 */
function getButtonDimensions() {
    return {
        width: b.offsetWidth,
        height: b.offsetHeight
    };
}

/**
 * Calculates a new random position for the button, ensuring it stays fully within the viewport.
 * @returns {{x: number, y: number}} Object with new 'left' (x) and 'top' (y) pixel values.
 */
function calculateNewPosition() {
    const { width, height } = getButtonDimensions(); // Get updated dimensions
    const maxPosX = window.innerWidth - width;
    const maxPosY = window.innerHeight - height;

    // Ensure button stays fully on screen (min 0, max possible position)
    const newX = Math.max(0, Math.min(maxPosX, Math.random() * maxPosX));
    const newY = Math.max(0, Math.min(maxPosY, Math.random() * maxPosY));
    return { x: newX, y: newY };
}

/**
 * Updates the button's visual styling (size, color, transition speed) based on game progress.
 */
function updateButtonStyling() {
    const colorIndex = currentMessageIndex % accentColors.length;
    const currentAccentColor = accentColors[colorIndex];

    // Apply font size based on progression: shrinks with each click
    const newFontSize = Math.max(MIN_FONT_SIZE_EM, INITIAL_FONT_SIZE_EM * Math.pow(SHRINK_FACTOR, currentMessageIndex));
    b.style.fontSize = `${newFontSize}em`;

    // Apply transition duration: decreases linearly to make button move faster
    const transitionProgress = currentMessageIndex / msgs.length;
    const newTransitionDuration = INITIAL_TRANSITION_DURATION - (MAX_TRANSITION_DIFFERENCE * transitionProgress);
    b.style.transition = `all ${Math.max(MIN_TRANSITION_DURATION, newTransitionDuration)}s ease-in-out, filter 0.1s ease-in-out`;

    // Apply new gradient background and shadow using the current accent color
    b.style.background = `linear-gradient(45deg, ${currentAccentColor} 0%, ${getDarkerColor(currentAccentColor, 20)} 100%)`;
    // Update CSS variable to ensure hover/active states use the current accent color dynamically
    document.documentElement.style.setProperty('--current-button-accent-color', currentAccentColor);
    b.style.boxShadow = `0 0 10px rgba(255,255,255,0.3), 0 0 20px ${currentAccentColor}80, inset 0 0 5px rgba(255,255,255,0.5)`;

    // Update body background with a subtle shift
    const bgIndex = currentMessageIndex % primaryBackgroundColors.length;
    document.body.style.background = `radial-gradient(circle at center, ${primaryBackgroundColors[bgIndex]} 0%, ${getDarkerColor(primaryBackgroundColors[bgIndex], 10)} 100%)`;
}

/**
 * Updates the progress counter display.
 */
function updateCounter() {
    counterElement.textContent = `Progress: ${currentMessageIndex} / ${msgs.length}`;
}

// Main button click handler
b.addEventListener('click', () => {
    if (currentMessageIndex < msgs.length) {
        // Display the current message based on 'currentMessageIndex'
        b.textContent = msgs[currentMessageIndex];

        updateButtonStyling(); // Apply size, color, transition speed
        const { x, y } = calculateNewPosition(); // Calculate new position *after* size update
        b.style.left = `${x}px`;
        b.style.top = `${y}px`;

        currentMessageIndex++; // Increment for the *next* click
        updateCounter();
    } else {
        // Win condition: triggered when 'currentMessageIndex' equals 'msgs.length'
        // meaning all messages have been displayed and the button is clicked one last time.
        b.style.display = 'none'; // Hide the button
        w.style.display = 'block'; // Show the win message
        w.classList.add('animate-win'); // Trigger win animation
        counterElement.style.display = 'none'; // Hide counter

        // Optional: Add a 'Play Again' button or automatic restart after a delay
        // setTimeout(() => location.reload(), 8000);
    }
});

/**
 * Initializes the game state on page load.
 */
function initializeGame() {
    currentMessageIndex = 0;
    b.textContent = "Click Me!"; // Initial button text
    b.style.display = 'block';
    w.style.display = 'none';
    w.classList.remove('animate-win'); // Ensure win animation is off
    counterElement.style.display = 'block';

    // Set initial position randomly
    const { x, y } = calculateNewPosition();
    b.style.left = `${x}px`;
    b.style.top = `${y}px`;

    // Apply initial styling (size, color, transition)
    // Temporarily reset currentMessageIndex to 0 to get initial styling
    const tempIndex = currentMessageIndex;
    currentMessageIndex = 0;
    updateButtonStyling();
    currentMessageIndex = tempIndex; // Restore original index

    updateCounter();
}

// Call initialization function on page load
initializeGame();

// Ensure the button remains responsive and within bounds upon window resizing
window.addEventListener('resize', () => {
    if (b.style.display !== 'none') { // Only reposition if button is visible
        const { x, y } = calculateNewPosition();
        b.style.left = `${x}px`;
        b.style.top = `${y}px`;
    }
});
</script>
</body>
</html>
