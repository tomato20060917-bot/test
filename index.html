<!DOCTYPE html>
<html>
<head>
<title>ULTRA BAKA CLICKER: THE SENTIENT SANDWICH</title>
<style>
body { background: #ff00ff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Comic Sans MS', cursive; overflow: hidden; margin: 0; }
#sandwich { width: 200px; height: 200px; cursor: crosshair; transition: transform 0.1s; border: 10px solid #000; background: #ffff00; display: flex; align-items: center; justify-content: center; font-size: 50px; user-select: none; position: relative; }
#stats { font-size: 30px; color: white; -webkit-text-stroke: 2px black; text-align: center; }
.shaker { animation: shake 0.1s infinite; }
@keyframes shake { 0% { transform: translate(1px, 1px); } 100% { transform: translate(-1px, -1px); } }
</style>
</head>
<body>

<div id="stats">SANDWICH HUNGER: 0<br>DON'T CLICK THE BREAD!</div>
<div id="sandwich" onclick="clickSandwich()">🥪</div>

<script>
let score = 0;
const s = document.getElementById('sandwich');
const t = document.getElementById('stats');

function getRandomColor() {
    return '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
}

const intervalId = setInterval(() => {
    if (score > 5) {
        // Use transform instead of margins to prevent layout thrashing with flexbox
        const x = (Math.random() * 200 - 100);
        const y = (Math.random() * 200 - 100);
        s.style.transform = `translate(${x}px, ${y}px) rotate(${Math.random() * 360}deg)`;
    }
}, 500);

function clickSandwich() {
    score++;
    t.innerHTML = "SANDWICH HUNGER: " + score + "<br>WHY ARE YOU DOING THIS?!";
    s.style.backgroundColor = getRandomColor();
    
    if (score > 10) {
        document.body.classList.add('shaker');
        t.innerHTML = "THE SANDWICH IS ANGRY!!";
    }
    
    if (score > 20) {
        s.innerText = "🍞";
        clearInterval(intervalId); // Clear interval to prevent race conditions
        alert("YOU KILLED THE SANDWICH! YOU MONSTER!");
        location.reload();
    }
}
</script>
</body>
</html>
