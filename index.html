<!DOCTYPE html>
<html>
<head>
<title>ULTRA-Baka-RAGE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
#ui { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; color: #ff00ff; text-shadow: 0 0 10px #ff00ff; font-size: 50px; }
#score { color: #ffff00; }
.shake { animation: s 0.1s infinite; }
@keyframes s { 0% {transform: translate(10px, 10px)} 100% {transform: translate(-10px, -10px)} }
</style>
</head>
<body>
<div id="ui">SCORE: <span id="score">0</span><br><small>Click to EJECT THE EMOJI</small></div>
<script>
const { Engine, Render, Runner, Bodies, World, Body, Events } = Matter;
const engine = Engine.create();
const render = Render.create({ element: document.body, engine: engine, options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#0a0a0a' } });

const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight + 50, window.innerWidth, 100, { isStatic: true });
World.add(engine.world, [ground]);

let score = 0;
let isShaking = false;

function spawnItem() {
    const emojis = ['🤡', '💩', '💀', '🔥', '🍆', '🧀'];
    const emoji = emojis[Math.floor(Math.random()*emojis.length)];
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><text y='60' font-size='60'>${emoji}</text></svg>`;
    const texture = `data:image/svg+xml,${encodeURIComponent(svg)}`;

    const body = Bodies.circle(Math.random() * window.innerWidth, -50, 40, {
        restitution: 1.5,
        render: { sprite: { texture: texture, xScale: 1, yScale: 1 } }
    });
    World.add(engine.world, body);
    Body.applyForce(body, body.position, { x: (Math.random()-0.5)*0.2, y: 0 });
    
    score++;
    document.getElementById('score').innerText = score;
    if(score % 10 === 0) {
        document.body.style.filter = `hue-rotate(${Math.random()*360}deg) invert(${Math.random()})`;
    }
}

window.addEventListener('click', spawnItem);

// Explicit engine update loop
function update() {
    Engine.update(engine, 1000 / 60);
    requestAnimationFrame(update);
}
update();

Render.run(render);

Events.on(engine, 'collisionStart', (e) => {
    e.pairs.forEach(p => {
        if((p.bodyA.speed > 5 || p.bodyB.speed > 5) && !isShaking) {
            isShaking = true;
            document.body.classList.add('shake');
            setTimeout(() => {
                document.body.classList.remove('shake');
                isShaking = false;
            }, 100);
        }
    });
});
</script>
</body>
</html>
